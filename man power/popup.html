<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Enhancer Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      width: 400px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 24px;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }

    input[type='text'],
    input[type='password'] {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
    }

    input[type='text']:focus,
    input[type='password']:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .helper-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }

    .helper-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .helper-text a:hover {
      text-decoration: underline;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .btn-test {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-test:hover {
      background: #e8e8e8;
      border-color: #d0d0d0;
    }

    .status {
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .status.success {
      display: block;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .status.error {
      display: block;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }

    .status.info {
      display: block;
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    input[type='checkbox'] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: 500;
      cursor: pointer;
    }

    .info-box {
      background: #f5f7fa;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      margin-top: 16px;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ AI Prompt Enhancer</h1>
    <p class="subtitle">Configure your API settings</p>

    <div id="status" class="status"></div>

    <form id="settingsForm">
      <div class="form-group">
        <label for="apiKey">Google Gemini API Key</label>
        <input
          type="password"
          id="apiKey"
          placeholder="Enter your Gemini API key"
          required
        />
        <p class="helper-text">
          Get your free API key from
          <a href="https://makersuite.google.com/app/apikey" target="_blank">
            Google AI Studio
          </a>
          (opens in new tab)
        </p>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="autoScrubPII" checked />
        <label for="autoScrubPII">Automatically scrub PII before sending to API</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="showStatusText" checked />
        <label for="showStatusText">Show refinement status text</label>
      </div>

      <div class="info-box">
        💡 <strong>Tip:</strong> Your API key is stored locally in your browser and never
        shared with third parties. The extension only sends prompts to Google's Gemini API
        for refinement.
      </div>

      <div class="button-group">
        <button type="submit" class="btn-save">Save Settings</button>
        <button type="button" id="testBtn" class="btn-test">Test API</button>
      </div>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
